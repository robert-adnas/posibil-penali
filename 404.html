<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // Single-page app redirect for GitHub Pages
    // Encodes the full path as a query param so index.html can restore it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
