    <div id="root"><noscript><h1>Mircea Drăghici</h1><p>PSD · Deputat</p><p>Status juridic: Condamnat definitiv</p><p>Utilizarea subvențiilor în alte scopuri decât cele pentru care au fost acordate; delapidare</p><p>Pedeapsă: 6 ani închisoare</p><p>După condamnarea definitivă la 5 ani din 1 iulie 2021 în dosarul achiziției unui imobil și al înstrăinării unui autoturism din patrimoniul partidului, Tribunalul București a admis la 5 septembrie 2022 un nou acord de recunoaștere a vinovăției, definitiv la 12 octombrie 2022, și a stabilit pedeapsa rezultantă de 6 ani închisoare. Într-un alt dosar privind contracte de consultanță pentru primării din Argeș, DNA a consemnat ulterior achitarea sa definitivă în 2024.</p></noscript></div>
